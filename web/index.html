<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>EyeToSpec</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-list">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">👁</span>
      <span class="brand-name">EyeToSpec</span>
    </div>
    <div class="tagline">From your eye to a spec — drag it where it looks right, export exact coordinates.</div>
  </header>

  <main class="container">
    <h1 class="section-title">Asset packs</h1>
    <p class="section-hint">
      Each pack is a folder in <code>config/</code> with a <code>pack.json</code>.
      Pick one, drag its pieces into place, and export the coordinates.
    </p>

    <div id="packs" class="pack-grid" aria-live="polite">
      <div class="empty">Loading…</div>
    </div>
  </main>

  <footer class="footer">
    <span>Local tool · nothing leaves your machine</span>
  </footer>

  <script>
    const grid = document.getElementById('packs');

    function card(pack) {
      const a = document.createElement('a');
      a.className = 'pack-card';
      a.href = 'editor.html?pack=' + encodeURIComponent(pack.id);
      a.innerHTML = `
        <div class="pack-card-top">
          <span class="pack-name"></span>
          ${pack.exported ? '<span class="badge">exported</span>' : ''}
        </div>
        <p class="pack-desc"></p>
        <div class="pack-meta">
          <span class="pack-id"></span>
          <span class="pack-count">${pack.elementCount} elements</span>
        </div>`;
      a.querySelector('.pack-name').textContent = pack.name;
      a.querySelector('.pack-desc').textContent = pack.description || '';
      a.querySelector('.pack-id').textContent = pack.id;
      return a;
    }

    function groupBlock(group) {
      const section = document.createElement('section');
      section.className = 'group-block';
      const head = document.createElement('div');
      head.className = 'group-head';
      head.innerHTML = `
        <span class="group-name"></span>
        <span class="group-count">${group.frames.length} frames</span>`;
      head.querySelector('.group-name').textContent = group.name;
      section.appendChild(head);
      if (group.description) {
        const d = document.createElement('p');
        d.className = 'group-desc';
        d.textContent = group.description;
        section.appendChild(d);
      }
      const inner = document.createElement('div');
      inner.className = 'pack-grid';
      group.frames.forEach((f, i) => {
        const c = card(f);
        // enter any frame; the editor then walks the rest via next / prev
        const tag = document.createElement('span');
        tag.className = 'frame-index';
        tag.textContent = (i + 1) + ' / ' + group.frames.length;
        c.querySelector('.pack-card-top').appendChild(tag);
        inner.appendChild(c);
      });
      section.appendChild(inner);
      return section;
    }

    fetch('/api/packs')
      .then(r => r.json())
      .then(data => {
        grid.innerHTML = '';
        const packs = data.packs || [];
        const groups = data.groups || [];
        if (packs.length === 0 && groups.length === 0) {
          grid.innerHTML = '<div class="empty">No packs found. Drop a folder with a <code>pack.json</code> into <code>config/</code> and refresh.</div>';
          return;
        }
        packs.forEach(p => grid.appendChild(card(p)));
        groups.forEach(g => grid.appendChild(groupBlock(g)));
      })
      .catch(err => {
        grid.innerHTML = '<div class="empty error">Failed to load packs: ' + err + '</div>';
      });
  </script>
</body>
</html>
